<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div id="content">

        <div id="menuAssinatura">
            <h1>2 - Pagamento</h1>
        </div>


        <div class="pagamentoCartao">

            <div class="pagamento">
                <h2>Cartão</h2>
                <div class="politica">
                    <div class="checkboxFinalizar">
                        <input type="checkbox">
                    </div>
                    <div class="politicaEmpresa">
                        <p>Ao finalizar a compra você concorda
                            com nossos Termos de Serviço e confirma
                            que leu nossa Política de Privacidade.
                            Você pode cancelar pagamentos recorrentes
                            a qualquer momento</p>
                    </div>
                </div>
            </div>

            <div class="botaoPagamento">

                <button type="submit">Enviar Pagamento</button>
            </div>

        </div>

        <div class="prazoPix">
            <h2>1 dia útil</h2>
        </div>

        <div class="prazo">

            <select name="Dropdown" id="Dropdown">
                <option value="pix">PIX via QR Code</option>
            </select>
        </div>

        <div class="prazoBoleto">
            <h2>3 dia útil</h2>
        </div>

        <div class="Prazo2">

            <select name="Dropdown" id="Dropdown">
                <option value="boleto">Boleto</option>
            </select>
        </div>

    </div>

   
</body>

</html>
