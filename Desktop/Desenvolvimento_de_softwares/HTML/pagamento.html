<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="assinaturas">
        <form action="#">
            <div class="formulario">

                <div class="tituloFormulario">
                    <label>1-Endereços de faturamento</label>
                </div>


                <div class="cadastroFormulario">
                    <label for="nome">Nome completo:</label>
                    <input type="text" name="nome" placeholder="Digite seu nome" required>

                </div>

                <div class="cadastroFormulario">

                    <label for="telefone">Número de telefone:</label>
                    <input type="text" name="telefone" placeholder="Digite seu Telefone" required>
                </div>

                <div class="cadastroFormulario">
                    <label for="endereço">Endereço:</label>
                    <input type="text" name="endereço" placeholder="Digite seu Endereço" required> 
                </div>

                <div class="cadastroFormulario">
                    <label for="cidade">Cidade:</label>
                    <input type="text" name="cidade" placeholder="Digite sua cidade" required>
                </div>
                <div class="cadastroFormulario">
                    <label for="cep">Cep:</label>
                    <input type="number" name="cep"placeholder="Digite seu CEP" required>
                </div>

                <div class="botaoContinuar">
                    <button type="submit">Continuar</button>
                </div>
            </div>



    </div>
    </form>




    </div>
